<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>browser-whisper | Native Web Audio Transcription</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --surface: rgba(24, 24, 27, 0.7);
      --surface-hover: rgba(39, 39, 42, 0.9);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --radius: 16px;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.12), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.12), transparent 25%);
    }

    .container {
      max-width: 800px;
      padding: 4rem 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(59, 130, 246, 0.2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.05em;
      line-height: 1.1;
      background: linear-gradient(to right, #ffffff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.6;
      margin: 0;
    }

    /* Terminal Window */
    .terminal {
      background: #000;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
    }

    .terminal-header {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.r {
      background: #ef4444;
    }

    .dot.y {
      background: #eab308;
    }

    .dot.g {
      background: #22c55e;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .tab {
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.2s;
    }

    .tab:hover,
    .tab.active {
      color: var(--text);
    }

    .code-block {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .code-block code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      color: #e2e8f0;
    }

    .copy-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--surface-hover);
    }

    /* Action Buttons */
    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.875rem 1.75rem;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: #e4e4e7;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .icon {
      width: 20px;
      height: 20px;
      margin-right: 8px;
      fill: currentColor;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="badge">v0.1.0 Available Now</div>

    <h1>browser-whisper</h1>
    <p class="subtitle">
      Zero-dependency, hardware-accelerated audio transcription directly in the browser. Powered by WebCodecs, WebGPU,
      and Transformers.js. No server required.
    </p>

    <div class="terminal">
      <div class="terminal-header">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
      </div>

      <div class="tabs">
        <div class="tab active" data-cmd="bun add browser-whisper">Bun</div>
        <div class="tab" data-cmd="npm install browser-whisper">npm</div>
        <div class="tab" data-cmd="pnpm add browser-whisper">pnpm</div>
        <div class="tab" data-cmd="yarn add browser-whisper">Yarn</div>
      </div>

      <div class="code-block">
        <code id="cmdCode">bun add browser-whisper</code>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
    </div>

    <div class="actions">
      <a href="/demo/" class="btn btn-primary">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
        Launch Demo
      </a>
      <a href="https://github.com/tanpreetsinghjolly/browser-whisper" class="btn btn-secondary">
        <svg class="icon" viewBox="0 0 24 24">
          <path
            d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
        </svg>
        GitHub
      </a>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const codeEl = document.getElementById('cmdCode');
    const copyBtn = document.getElementById('copyBtn');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        codeEl.textContent = tab.dataset.cmd;
      });
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(codeEl.textContent);
      const originalText = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      copyBtn.style.background = '#22c55e';
      copyBtn.style.color = '#fff';
      copyBtn.style.borderColor = '#22c55e';

      setTimeout(() => {
        copyBtn.textContent = originalText;
        copyBtn.style.background = '';
        copyBtn.style.color = '';
        copyBtn.style.borderColor = '';
      }, 2000);
    });
  </script>
</body>

</html>
